spring:
  application:
    name: crypto-trading

  datasource:
    url: jdbc:h2:mem:crypto_trading;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

  cloud:
    openfeign:
      client:
        config:
          binancePriceClient:
            url: https://api.binance.com
          huobiPriceClient:
            url: https://api.huobi.pro

springdoc:
  api-docs:
    path: /v3/api-docs
    version: openapi_3_1
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.aquariux.trading: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: WARN
    com.zaxxer.hikari: WARN
    feign: WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n"
