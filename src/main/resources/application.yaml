spring:
  application:
    name: crypto-trading

  datasource:
    url: jdbc:h2:mem:crypto_trading;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console
